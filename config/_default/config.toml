######################## VisionInit Configuration ####################
# Base URL MUST end with a slash
title = "Open Neuromorphic - Advancing Brain-Inspired Computing"
# Default time zone for time stamps
timeZone = "America/New_York" # Adjust if needed
# Pagination (can adjust later if needed)
paginate = 30
# Summary length for auto-generated excerpts
summaryLength = 70

disableKinds = ["taxonomy", "term"]

hasCJKLanguage = false # Keep false unless you use CJK languages

#################### Parameters (site-wide variables) ##################
[params]
logo = "/logo.png" # <<< NEW: Path to your consultancy logo (relative to static/)
favicon = "/favicon.ico" # Path to your favicon (relative to static/)
# Meta data
description = "Open Neuromorphic (ONM) is a collaborative open-source community dedicated to advancing the field of neuromorphic computing. Explore resources, software, hardware, and events."
author = "The Open Neuromorphic Community"

home = "Home" # Added from languages.toml
copyright = "Copyright © 2025 Open Neuromorphic"
github_repo = "https://github.com/open-neuromorphic/open-neuromorphic.github.io" # Link to the site's repository

# Contact Info (Optional, used in theme potentially)
address = "" # Add if relevant
# Contact form action (Update if you use a form service like Formspree, Netlify Forms, etc.)
contact_form_action = "/contact/" # Example: point to a contact page

# Social Links (Used in header/footer - Update links)
[[params.social]]
title = "LinkedIn"
icon = "fa-brands fa-linkedin" # Font Awesome icon class
icon_style = "brands"
icon_name = "linkedin"
link = "https://www.linkedin.com/company/open-neuromorphic/"
[[params.social]]
title = "GitHub"
icon = "fa-brands fa-github"
icon_style = "brands"
icon_name = "github"
link = "https://github.com/open-neuromorphic"

[[params.social]]
title = "X (formerly Twitter)"
icon_style = "brands"
icon_name = "x-twitter" # Assuming you use an 'x-twitter' SVG icon
link = "https://x.com/OpenNeuromorphic" # Placeholder, update if different
[[params.social]]
title = "Discord"
icon_style = "brands"
icon_name = "discord"
link = "https://discord.gg/C9bzWgNmqk"

# ONM Specific Params (Optional, can be used in layouts)
tagline = "Collaborate, Learn, and Innovate in Neuromorphic Computing."
# Example Call to Action params
[params.cta]
enable = true # Used in index.html potentially
title = "Join the Neuromorphic Community"
subtitle = "Connect with researchers, developers, and enthusiasts."
button_label = "Get Involved"
button_link = "/getting-involved/"

# Top Header (Disable for cleaner look, was enabled in original)
top_header = false

# Cookie Consent (Keep settings from original if desired)
[params.cookies]
enable = true
expire_days = 30 # Or adjust as needed

# CSS Plugins
# [[params.plugins.css]]
# link = "plugins/bootstrap-5/css/bootstrap.min.css"

# JS Plugins
[[params.plugins.js]]
link = "plugins/bootstrap-5/js/bootstrap.bundle.min.js" # Bootstrap 5 bundle includes Popper
[[params.plugins.js]]
link = "plugins/js-cookie/js.cookie.min.js" # For cookie consent

[[params.plugins.js]]
link = "plugins/youtube-lite.js"

############################# Build Configuration ##############################
# Keep build settings from output.txt for now
[build]
noJSConfigInAssets = false
useResourceCacheWhen = 'fallback'
[build.buildStats]
enable = true # Can disable stats locally if not needed
[[build.cachebusters]]
source = 'assets/.*\.(js|ts|jsx|tsx)'
target = '(js|scripts|javascript)'
[[build.cachebusters]]
source = 'assets/.*\.(css|sass|scss)$'
target = '(css|styles|scss|sass)'
[[build.cachebusters]]
source = 'assets/.*\.(.*)$'
target = '$1'

############################# Outputs ##############################
[outputs]
home = ["HTML", "Sitemap"]
page = ["HTML", "Sitemap"]
section = ["HTML", "Sitemap"]

############################# Imaging ##############################
[imaging]
quality = 90
resampleFilter = "Lanczos"

############################# Caches ###############################
# Keep cache settings from output.txt
[caches]
[caches.images]
dir = ":resourceDir/_gen"
maxAge = "720h"
[caches.assets]
dir = ":resourceDir/_gen"
maxAge = "720h"

[sitemap]
changefreq = "weekly" # How frequently the content is likely to change (e.g., "always", "hourly", "daily", "weekly", "monthly", "yearly", "never")
priority = 0.5        # Priority of this URL relative to other URLs on your site (0.0 to 1.0)
filename = "sitemap.xml" # Default filename (usually no need to change)
disableKinds = []

[markup]
[markup.goldmark]
  [markup.goldmark.renderer]
    unsafe = true # Allow raw HTML in Markdown, needed for some render hooks
