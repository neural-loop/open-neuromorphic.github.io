<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      font-family: 'Inter', sans-serif;
      background-color: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .container {
      width: 1000px;
      max-height: 550px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
      box-sizing: border-box;
      overflow: hidden;
    }

    .logo {
      max-height: 150px;
      max-width: 250px;
      margin-bottom: 20px;
      display: block; /* Default display */
    }
    img.logo[src=""] {
      display: none; /* Hide if src is empty */
    }

    .title {
      font-size: 50px;
      font-weight: 600;
      line-height: 1.2;
      color: #1e1e4b;
      margin: 0 0 20px 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .description {
      font-size: 30px;
      font-weight: 400;
      line-height: 1.45;
      color: #5c5c77;
      margin: 0 0 30px 0;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .site-name {
      font-size: 26px;
      font-weight: 600;
      /* <<< FIX HERE: Use the placeholder >>> */
      color: PRIMARY_COLOR_PLACEHOLDER;
      margin-top: auto;
      align-self: flex-start;
    }

  </style>
</head>
<body>
<div class="container">
  <img src="LOGO_SRC" alt="Site Logo" class="logo">
  <h1 class="title">PAGE_TITLE</h1>
  <p class="description">PAGE_DESCRIPTION</p>
  <div class="site-name">SITE_NAME</div>
</div>
</body>
</html>
