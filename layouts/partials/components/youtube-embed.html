{{/* layouts/partials/components/youtube-embed.html */}}
{{ $id := .Id }}
{{ $title := .Title | default "YouTube video player" }}

{{ if $id }}
<div class="youtube-embed-container" style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; background: #000;">
  <iframe
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;"
    src="https://www.youtube-nocookie.com/embed/{{ $id }}"
    title="{{ $title }}"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen
    loading="lazy"
  ></iframe>
</div>
{{ else }}
  {{ warnf "YouTube embed partial called without an 'Id'. Page: %s" .Page.Path }}
{{ end }}
